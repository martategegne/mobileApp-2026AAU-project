stages:
  - analyze
  - test
  - coverage

variables:
  FLUTTER_VERSION: "3.10.0"
  FLUTTER_HOME: "/builds/cache/flutter"
  PATH: "${FLUTTER_HOME}/bin:${PATH}"

before_script:
  - echo "Preparing Flutter environment..."
  - flutter --version
  - flutter pub get

analyze:
  stage: analyze
  script:
    - flutter analyze
  allow_failure: false

unit_tests:
  stage: test
  script:
    - echo "Running unit tests..."
    - flutter test test/unit/ --coverage
  coverage: '/lines\.*: (\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/lcov.info

widget_tests:
  stage: test
  script:
    - echo "Running widget tests..."
    - flutter test test/widget/ --coverage
  coverage: '/lines\.*: (\d+\.\d+)%/'

riverpod_tests:
  stage: test
  script:
    - echo "Running Riverpod tests..."
    - flutter test test/riverpod/ --coverage
  coverage: '/lines\.*: (\d+\.\d+)%/'

integration_tests:
  stage: test
  script:
    - echo "Running integration tests..."
    - flutter test integration_test/

all_tests_with_coverage:
  stage: coverage
  script:
    - echo "Running all tests with coverage..."
    - flutter test --coverage
    - apt-get update && apt-get install -y lcov
    - lcov --list coverage/lcov.info
  artifacts:
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/lcov.info
  only:
    - main
    - develop
